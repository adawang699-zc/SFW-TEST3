{% extends 'base.html' %}
{% block title %}SNMP 管理{% endblock %}

{% block content %}
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
    <!-- SNMP GET/WALK -->
    <div class="card">
        <div class="card-header">SNMP 查询</div>

        <div class="form-group">
            <label class="form-label">设备 IP *</label>
            <div style="display: flex; gap: 8px;">
                <select id="snmp-ip-select" class="form-input" style="width: 200px;">
                    <option value="">-- 选择设备 --</option>
                </select>
                <input type="text" id="snmp-ip" class="form-input" placeholder="或手动输入 IP" style="flex: 1;">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">SNMP 版本</label>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="btn-v1" style="flex: 1;">V1</button>
                <button class="btn btn-primary" id="btn-v2c" style="flex: 1;">V2C</button>
                <button class="btn btn-secondary" id="btn-v3" style="flex: 1;">V3</button>
            </div>
        </div>

        <!-- V1/V2C 配置 -->
        <div id="v1-v2c-config">
            <div class="form-group">
                <label class="form-label">Community</label>
                <input type="text" id="snmp-community" class="form-input" value="public">
            </div>
        </div>

        <!-- V3 配置 -->
        <div id="v3-config" style="display: none;">
            <div class="form-group">
                <label class="form-label">安全用户名</label>
                <input type="text" id="snmp-username" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">安全级别</label>
                <select id="snmp-level" class="form-input">
                    <option value="noAuthNoPriv">不认证不加密</option>
                    <option value="authNoPriv">只认证不加密</option>
                    <option value="authPriv">既认证又加密</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">认证方式</label>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" id="btn-auth-md5" style="flex: 1;">MD5</button>
                    <button class="btn btn-secondary" id="btn-auth-sha" style="flex: 1;">SHA</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">认证密码</label>
                <input type="password" id="snmp-auth-pass" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">加密方式</label>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" id="btn-priv-des" style="flex: 1;">DES</button>
                    <button class="btn btn-secondary" id="btn-priv-aes" style="flex: 1;">AES</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">加密密码</label>
                <input type="password" id="snmp-priv-pass" class="form-input">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">端口</label>
            <input type="number" id="snmp-port" class="form-input" value="161">
        </div>

        <div class="form-group">
            <label class="form-label">OID *</label>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <select id="snmp-oid-select" class="form-input" style="width: 280px;">
                    <option value="">-- 选择常用 OID --</option>
                    <!-- 系统信息 -->
                    <optgroup label="系统信息 (System)">
                        <option value="1.3.6.1.2.1.1.1.0">系统描述 (sysDescr)</option>
                        <option value="1.3.6.1.2.1.1.2.0">系统 OID (sysObjectID)</option>
                        <option value="1.3.6.1.2.1.1.3.0">系统运行时间 (sysUpTime)</option>
                        <option value="1.3.6.1.2.1.1.4.0">系统联系人 (sysContact)</option>
                        <option value="1.3.6.1.2.1.1.5.0">系统名称 (sysName)</option>
                        <option value="1.3.6.1.2.1.1.6.0">系统位置 (sysLocation)</option>
                        <option value="1.3.6.1.2.1.1.7.0">系统服务 (sysServices)</option>
                    </optgroup>
                    <!-- 接口信息 -->
                    <optgroup label="接口信息 (Interfaces) - WALK">
                        <option value="1.3.6.1.2.1.2.1.0">接口数量 (ifNumber)</option>
                        <option value="1.3.6.1.2.1.2.2.1.1">接口索引 (ifIndex)</option>
                        <option value="1.3.6.1.2.1.2.2.1.2">接口描述 (ifDescr)</option>
                        <option value="1.3.6.1.2.1.2.2.1.3">接口类型 (ifType)</option>
                        <option value="1.3.6.1.2.1.2.2.1.5">接口速率 (ifSpeed)</option>
                        <option value="1.3.6.1.2.1.2.2.1.6">接口 MAC (ifPhysAddress)</option>
                        <option value="1.3.6.1.2.1.2.2.1.7">接口管理状态 (ifAdminStatus)</option>
                        <option value="1.3.6.1.2.1.2.2.1.8">接口运行状态 (ifOperStatus)</option>
                        <option value="1.3.6.1.2.1.2.2.1.10">接口入流量 (ifInOctets)</option>
                        <option value="1.3.6.1.2.1.2.2.1.16">接口出流量 (ifOutOctets)</option>
                        <option value="1.3.6.1.2.1.2.2.1.20">接口入错误 (ifInErrors)</option>
                        <option value="1.3.6.1.2.1.2.2.1.21">接口出错误 (ifOutErrors)</option>
                    </optgroup>
                    <!-- IP 信息 -->
                    <optgroup label="IP 信息 (IP) - WALK">
                        <option value="1.3.6.1.2.1.4.1.0">IP 转发状态 (ipForwarding)</option>
                        <option value="1.3.6.1.2.1.4.20.1.1">IP 地址表 (ipAdEntAddr)</option>
                        <option value="1.3.6.1.2.1.4.20.1.2">IP 子网掩码 (ipAdEntNetMask)</option>
                        <option value="1.3.6.1.2.1.4.21.1.1">路由目标 (ipRouteDest)</option>
                        <option value="1.3.6.1.2.1.4.21.1.7">路由下一跳 (ipRouteNextHop)</option>
                    </optgroup>
                    <!-- CPU/内存 (Linux/Net-SNMP) -->
                    <optgroup label="CPU/内存 (Linux)">
                        <option value="1.3.6.1.4.1.2021.11.9.0">CPU 空闲率 (ssCpuIdle)</option>
                        <option value="1.3.6.1.4.1.2021.11.10.0">CPU 系统占用 (ssCpuSystem)</option>
                        <option value="1.3.6.1.4.1.2021.11.11.0">CPU 用户占用 (ssCpuUser)</option>
                        <option value="1.3.6.1.4.1.2021.4.5.0">物理内存总量 (memTotalReal)</option>
                        <option value="1.3.6.1.4.1.2021.4.6.0">物理内存可用 (memAvailReal)</option>
                        <option value="1.3.6.1.4.1.2021.4.11.0">Swap 总量 (memTotalSwap)</option>
                        <option value="1.3.6.1.4.1.2021.4.12.0">Swap 可用 (memAvailSwap)</option>
                        <option value="1.3.6.1.4.1.2021.4.13.0">内存共享 (memShared)</option>
                        <option value="1.3.6.1.4.1.2021.4.14.0">内存缓冲 (memBuffer)</option>
                        <option value="1.3.6.1.4.1.2021.4.15.0">内存缓存 (memCached)</option>
                    </optgroup>
                    <!-- 磁盘信息 -->
                    <optgroup label="磁盘信息 (Linux) - WALK">
                        <option value="1.3.6.1.4.1.2021.9.1.1">磁盘索引 (dskIndex)</option>
                        <option value="1.3.6.1.4.1.2021.9.1.2">磁盘路径 (dskPath)</option>
                        <option value="1.3.6.1.4.1.2021.9.1.3">磁盘设备 (dskDevice)</option>
                        <option value="1.3.6.1.4.1.2021.9.1.6">磁盘总量 (dskTotal)</option>
                        <option value="1.3.6.1.4.1.2021.9.1.7">磁盘可用 (dskAvail)</option>
                        <option value="1.3.6.1.4.1.2021.9.1.8">磁盘使用率 (dskPercent)</option>
                    </optgroup>
                    <!-- 进程信息 -->
                    <optgroup label="进程信息 (Linux) - WALK">
                        <option value="1.3.6.1.4.1.2021.2.1.1">进程索引 (prIndex)</option>
                        <option value="1.3.6.1.4.1.2021.2.1.2">进程名称 (prNames)</option>
                        <option value="1.3.6.1.4.1.2021.2.1.5">进程 CPU (prCpu)</option>
                        <option value="1.3.6.1.4.1.2021.2.1.6">进程内存 (prMem)</option>
                    </optgroup>
                    <!-- SNMP 统计 -->
                    <optgroup label="SNMP 统计">
                        <option value="1.3.6.1.2.1.11.1.0">SNMP 入包数 (snmpInPkts)</option>
                        <option value="1.3.6.1.2.1.11.2.0">SNMP 出包数 (snmpOutPkts)</option>
                        <option value="1.3.6.1.2.1.11.3.0">SNMP 错误包 (snmpInBadVersions)</option>
                        <option value="1.3.6.1.2.1.11.4.0">SNMP 错误社区 (snmpInBadCommunityNames)</option>
                    </optgroup>
                    <!-- TCP/UDP -->
                    <optgroup label="TCP/UDP 统计">
                        <option value="1.3.6.1.2.1.6.1.0">TCP 连接数 (tcpCurrEstab)</option>
                        <option value="1.3.6.1.2.1.6.5.0">TCP 活动打开 (tcpActiveOpens)</option>
                        <option value="1.3.6.1.2.1.6.6.0">TCP 被动打开 (tcpPassiveOpens)</option>
                        <option value="1.3.6.1.2.1.7.1.0">UDP 入包数 (udpInDatagrams)</option>
                        <option value="1.3.6.1.2.1.7.2.0">UDP 出包数 (udpOutDatagrams)</option>
                        <option value="1.3.6.1.2.1.7.3.0">UDP 无端口 (udpNoPorts)</option>
                    </optgroup>
                    <!-- ICMP -->
                    <optgroup label="ICMP 统计">
                        <option value="1.3.6.1.2.1.5.1.0">ICMP 入消息 (icmpInMsgs)</option>
                        <option value="1.3.6.1.2.1.5.2.0">ICMP 入错误 (icmpInErrors)</option>
                        <option value="1.3.6.1.2.1.5.3.0">ICMP 入目的地不可达 (icmpInDestUnreachs)</option>
                        <option value="1.3.6.1.2.1.5.14.0">ICMP 出消息 (icmpOutMsgs)</option>
                    </optgroup>
                </select>
                <input type="text" id="snmp-oid" class="form-input" placeholder="或手动输入 OID" style="flex: 1; min-width: 200px;">
            </div>
            <small style="color: var(--text-muted);">选择常用 OID 或手动输入，带 WALK 标记的需要勾选 WALK</small>
        </div>

        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary);">
                <input type="checkbox" id="snmp-walk">
                使用 WALK（遍历 OID 子树）
            </label>
        </div>

        <button class="btn btn-primary" id="btn-query" style="width: 100%;">查询</button>

        <div style="margin-top: 20px;">
            <label class="form-label">查询结果</label>
            <div id="snmp-result" style="background: var(--bg-dark); padding: 16px; border-radius: 10px; min-height: 150px; max-height: 400px; overflow-x: auto; overflow-y: auto; font-family: monospace; color: var(--text-secondary);">
                等待查询...
            </div>
        </div>
    </div>

    <!-- SNMPTRAP 接收 -->
    <div class="card">
        <div class="card-header">SNMPTRAP 接收</div>

        <div class="form-group">
            <label class="form-label">监听端口</label>
            <input type="number" id="trap-port" class="form-input" value="162">
        </div>

        <div class="form-group">
            <label class="form-label">接收版本</label>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-primary" id="btn-trap-v2c" style="flex: 1;">V1/V2C</button>
                <button class="btn btn-secondary" id="btn-trap-v3" style="flex: 1;">V3</button>
            </div>
        </div>

        <!-- V1/V2C 配置 -->
        <div id="trap-v1-v2c-config">
            <div class="form-group">
                <label class="form-label">Community</label>
                <input type="text" id="trap-community" class="form-input" value="public" placeholder="多个用逗号分隔，如 public,private">
                <small style="color: var(--text-muted);">V1/V2C 使用 community 认证，留空则接受所有</small>
            </div>
        </div>

        <!-- V3 配置 -->
        <div id="trap-v3-config" style="display: none;">
            <div class="form-group">
                <label class="form-label">安全用户名</label>
                <input type="text" id="trap-username" class="form-input" placeholder="留空则接受所有用户">
            </div>

            <div class="form-group">
                <label class="form-label">安全级别</label>
                <select id="trap-level" class="form-input">
                    <option value="noAuthNoPriv">不认证不加密</option>
                    <option value="authNoPriv">只认证不加密</option>
                    <option value="authPriv">既认证又加密</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">认证方式</label>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" id="btn-trap-auth-md5" style="flex: 1;">MD5</button>
                    <button class="btn btn-secondary" id="btn-trap-auth-sha" style="flex: 1;">SHA</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">认证密码</label>
                <input type="password" id="trap-auth-pass" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">加密方式</label>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" id="btn-trap-priv-des" style="flex: 1;">DES</button>
                    <button class="btn btn-secondary" id="btn-trap-priv-aes" style="flex: 1;">AES</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">加密密码</label>
                <input type="password" id="trap-priv-pass" class="form-input">
            </div>
        </div>

        <div style="display: flex; gap: 12px;">
            <button class="btn btn-success" id="btn-trap-start">启动</button>
            <button class="btn btn-danger" id="btn-trap-stop" style="display: none;">停止</button>
            <button class="btn btn-secondary" id="btn-trap-clear">清屏</button>
        </div>

        <div style="margin-top: 16px;">
            <span class="status-badge status-stopped" id="trap-status">未运行</span>
            <span style="color: var(--text-secondary); margin-left: 12px;">TRAP 数: <span id="trap-count">0</span></span>
        </div>

        <div style="margin-top: 20px; max-height: 400px; overflow-y: auto;">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 140px;">时间</th>
                        <th style="width: 120px;">来源 IP</th>
                        <th>OID 值</th>
                    </tr>
                </thead>
                <tbody id="trap-table">
                    <tr><td colspan="3" style="color: var(--text-secondary);">暂无 TRAP</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let snmpVersion = 'v2c';
let snmpAuthProtocol = 'MD5';
let snmpPrivProtocol = 'DES';
let trapVersion = 'v2c';  // TRAP 接收版本
let trapAuthProtocol = 'MD5';
let trapPrivProtocol = 'DES';
let trapUpdateInterval = null;

// 加载设备列表
async function loadDevices() {
    const result = await apiRequest('/api/devices/list/');
    const select = document.getElementById('snmp-ip-select');
    select.innerHTML = '<option value="">-- 选择设备 --</option>';

    if (result.devices && result.devices.length > 0) {
        result.devices.forEach(device => {
            const option = document.createElement('option');
            option.value = device.ip;
            option.textContent = device.name ? `${device.name} (${device.ip})` : device.ip;
            select.appendChild(option);
        });
    }
}

// 设备 IP 选择
document.getElementById('snmp-ip-select').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('snmp-ip').value = this.value;
    }
});

// SNMP 版本切换
document.getElementById('btn-v1').addEventListener('click', function() {
    snmpVersion = 'v1';
    updateVersionButtons();
});
document.getElementById('btn-v2c').addEventListener('click', function() {
    snmpVersion = 'v2c';
    updateVersionButtons();
});
document.getElementById('btn-v3').addEventListener('click', function() {
    snmpVersion = 'v3';
    updateVersionButtons();
});

function updateVersionButtons() {
    document.getElementById('btn-v1').className = snmpVersion === 'v1' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-v2c').className = snmpVersion === 'v2c' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-v3').className = snmpVersion === 'v3' ? 'btn btn-primary' : 'btn btn-secondary';

    document.getElementById('v1-v2c-config').style.display = snmpVersion === 'v3' ? 'none' : 'block';
    document.getElementById('v3-config').style.display = snmpVersion === 'v3' ? 'block' : 'none';
}

// SNMP V3 认证方式切换
document.getElementById('btn-auth-md5').addEventListener('click', function() {
    snmpAuthProtocol = 'MD5';
    updateAuthButtons();
});
document.getElementById('btn-auth-sha').addEventListener('click', function() {
    snmpAuthProtocol = 'SHA';
    updateAuthButtons();
});

function updateAuthButtons() {
    document.getElementById('btn-auth-md5').className = snmpAuthProtocol === 'MD5' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-auth-sha').className = snmpAuthProtocol === 'SHA' ? 'btn btn-primary' : 'btn btn-secondary';
}

// SNMP V3 加密方式切换
document.getElementById('btn-priv-des').addEventListener('click', function() {
    snmpPrivProtocol = 'DES';
    updatePrivButtons();
});
document.getElementById('btn-priv-aes').addEventListener('click', function() {
    snmpPrivProtocol = 'AES';
    updatePrivButtons();
});

function updatePrivButtons() {
    document.getElementById('btn-priv-des').className = snmpPrivProtocol === 'DES' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-priv-aes').className = snmpPrivProtocol === 'AES' ? 'btn btn-primary' : 'btn btn-secondary';
}

// TRAP V3 认证方式切换
document.getElementById('btn-trap-auth-md5').addEventListener('click', function() {
    trapAuthProtocol = 'MD5';
    updateTrapAuthButtons();
});
document.getElementById('btn-trap-auth-sha').addEventListener('click', function() {
    trapAuthProtocol = 'SHA';
    updateTrapAuthButtons();
});

function updateTrapAuthButtons() {
    document.getElementById('btn-trap-auth-md5').className = trapAuthProtocol === 'MD5' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-trap-auth-sha').className = trapAuthProtocol === 'SHA' ? 'btn btn-primary' : 'btn btn-secondary';
}

// TRAP V3 加密方式切换
document.getElementById('btn-trap-priv-des').addEventListener('click', function() {
    trapPrivProtocol = 'DES';
    updateTrapPrivButtons();
});
document.getElementById('btn-trap-priv-aes').addEventListener('click', function() {
    trapPrivProtocol = 'AES';
    updateTrapPrivButtons();
});

function updateTrapPrivButtons() {
    document.getElementById('btn-trap-priv-des').className = trapPrivProtocol === 'DES' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-trap-priv-aes').className = trapPrivProtocol === 'AES' ? 'btn btn-primary' : 'btn btn-secondary';
}

// TRAP 版本切换
document.getElementById('btn-trap-v2c').addEventListener('click', function() {
    trapVersion = 'v2c';
    updateTrapVersionButtons();
});
document.getElementById('btn-trap-v3').addEventListener('click', function() {
    trapVersion = 'v3';
    updateTrapVersionButtons();
});

function updateTrapVersionButtons() {
    document.getElementById('btn-trap-v2c').className = trapVersion === 'v2c' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('btn-trap-v3').className = trapVersion === 'v3' ? 'btn btn-primary' : 'btn btn-secondary';

    document.getElementById('trap-v1-v2c-config').style.display = trapVersion === 'v3' ? 'none' : 'block';
    document.getElementById('trap-v3-config').style.display = trapVersion === 'v3' ? 'block' : 'none';
}

// OID 下拉选择
document.getElementById('snmp-oid-select').addEventListener('change', function() {
    const selectedOid = this.value;
    if (selectedOid) {
        document.getElementById('snmp-oid').value = selectedOid;
        // WALK 类型的 OID 自动勾选
        const walkCheckbox = document.getElementById('snmp-walk');
        // 接口、IP、磁盘、进程等需要 WALK
        const walkOids = ['1.3.6.1.2.1.2.2', '1.3.6.1.2.1.4.20', '1.3.6.1.2.1.4.21', '1.3.6.1.4.1.2021.9', '1.3.6.1.4.1.2021.2'];
        const needWalk = walkOids.some(prefix => selectedOid.startsWith(prefix));
        walkCheckbox.checked = needWalk;
    }
});

// SNMP 查询
document.getElementById('btn-query').addEventListener('click', async function() {
    const ip = document.getElementById('snmp-ip').value.trim();
    const oid = document.getElementById('snmp-oid').value.trim();
    const port = parseInt(document.getElementById('snmp-port').value) || 161;
    const walk = document.getElementById('snmp-walk').checked;

    if (!ip || !oid) {
        showToast('请输入 IP 和 OID', 'error');
        return;
    }

    const payload = {
        ip: ip,
        oid: oid,
        version: snmpVersion,
        port: port,
        walk: walk
    };

    if (snmpVersion === 'v1' || snmpVersion === 'v2c') {
        payload.community = document.getElementById('snmp-community').value || 'public';
    } else {
        payload.security_username = document.getElementById('snmp-username').value;
        payload.security_level = document.getElementById('snmp-level').value;
        payload.auth_protocol = snmpAuthProtocol;
        payload.auth_password = document.getElementById('snmp-auth-pass').value;
        payload.priv_protocol = snmpPrivProtocol;
        payload.priv_password = document.getElementById('snmp-priv-pass').value;
    }

    const resultDiv = document.getElementById('snmp-result');
    resultDiv.innerHTML = '<span style="color: var(--secondary);">查询中...</span>';

    const result = await apiRequest('/api/snmp/get/', 'POST', payload);

    if (result.success && result.data && result.data.length > 0) {
        // 结果表格固定布局
        let html = '<table style="width: 100%; table-layout: fixed; margin: 0;"><thead><tr><th style="width: 50%; overflow: hidden; text-overflow: ellipsis;">OID</th><th style="width: 35%; overflow: hidden; text-overflow: ellipsis;">值</th><th style="width: 15%;">类型</th></tr></thead><tbody>';
        result.data.forEach(item => {
            html += `<tr>
                <td style="word-break: break-all; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(item.oid)}</td>
                <td style="word-break: break-all; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(item.value)}</td>
                <td>${escapeHtml(item.type)}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        if (result.data.length > 50) {
            html += `<div style="color: var(--text-muted); margin-top: 8px; font-size: 0.85rem;">共 ${result.data.length} 条结果</div>`;
        }
        resultDiv.innerHTML = html;
    } else if (result.success) {
        resultDiv.innerHTML = '<span style="color: var(--text-muted);">无数据</span>';
    } else {
        resultDiv.innerHTML = `<span style="color: var(--danger);">错误: ${escapeHtml(result.error)}</span>`;
    }
});

// TRAP 接收器控制
async function fetchTrapStatus() {
    const result = await apiRequest('/api/snmp/trap/status/');
    const badge = document.getElementById('trap-status');
    const btnStart = document.getElementById('btn-trap-start');
    const btnStop = document.getElementById('btn-trap-stop');
    const portInput = document.getElementById('trap-port');

    if (result.status && result.status.running) {
        badge.className = 'status-badge status-running';
        badge.textContent = `运行中 (端口: ${result.status.port})`;
        btnStart.style.display = 'none';
        btnStop.style.display = 'inline-block';
        portInput.disabled = true;

        if (!trapUpdateInterval) {
            trapUpdateInterval = setInterval(fetchTraps, 1000);
        }
    } else {
        badge.className = 'status-badge status-stopped';
        badge.textContent = '未运行';
        btnStart.style.display = 'inline-block';
        btnStop.style.display = 'none';
        portInput.disabled = false;

        if (trapUpdateInterval) {
            clearInterval(trapUpdateInterval);
            trapUpdateInterval = null;
        }
    }

    document.getElementById('trap-count').textContent = result.status ? result.status.trap_count : 0;
}

async function fetchTraps() {
    const result = await apiRequest('/api/snmp/trap/traps/?limit=1000');
    renderTraps(result.traps || []);
    document.getElementById('trap-count').textContent = result.traps ? result.traps.length : 0;
}

function renderTraps(traps) {
    const tbody = document.getElementById('trap-table');

    if (traps.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="color: var(--text-secondary);">暂无 TRAP</td></tr>';
        return;
    }

    traps = traps.reverse();

    tbody.innerHTML = traps.map(trap => {
        const oidValues = (trap.oid_values || []).map(item =>
            `${escapeHtml(item.oid)} = ${escapeHtml(item.value)}`
        ).join('<br>');

        return `
            <tr>
                <td style="white-space: nowrap;">${escapeHtml(trap.timestamp)}</td>
                <td><span style="background: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 0.85rem;">${escapeHtml(trap.source_ip)}</span></td>
                <td style="word-break: break-all; font-size: 0.85rem;">${oidValues || '-'}</td>
            </tr>
        `;
    }).join('');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 启动 TRAP
document.getElementById('btn-trap-start').addEventListener('click', async function() {
    const port = parseInt(document.getElementById('trap-port').value) || 162;

    const payload = {
        action: 'start',
        port: port,
        version: trapVersion
    };

    if (trapVersion === 'v2c') {
        // V1/V2C 配置
        payload.community = document.getElementById('trap-community').value || 'public';
    } else {
        // V3 配置
        payload.security_username = document.getElementById('trap-username').value;
        payload.security_level = document.getElementById('trap-level').value;
        payload.auth_protocol = trapAuthProtocol;
        payload.auth_password = document.getElementById('trap-auth-pass').value;
        payload.priv_protocol = trapPrivProtocol;
        payload.priv_password = document.getElementById('trap-priv-pass').value;
    }

    const result = await apiRequest('/api/snmp/trap/control/', 'POST', payload);

    if (result.success) {
        showToast(result.message, 'success');
        fetchTrapStatus();
    } else {
        showToast(result.message || result.error, 'error');
    }
});

// 停止 TRAP
document.getElementById('btn-trap-stop').addEventListener('click', async function() {
    const result = await apiRequest('/api/snmp/trap/control/', 'POST', { action: 'stop' });

    if (result.success) {
        showToast(result.message, 'success');
        fetchTrapStatus();
    } else {
        showToast(result.message || result.error, 'error');
    }
});

// 清屏
document.getElementById('btn-trap-clear').addEventListener('click', async function() {
    showConfirmModal('清空确认', '确定清空所有 TRAP？', async function() {
        const result = await apiRequest('/api/snmp/trap/clear/', 'POST');
        if (result.success) {
            showToast(result.message, 'success');
            fetchTraps();
        }
    });
});

// 页面初始化
window.onload = function() {
    loadDevices();
    fetchTrapStatus();
    fetchTraps();
    setInterval(fetchTrapStatus, 5000);
};
</script>
