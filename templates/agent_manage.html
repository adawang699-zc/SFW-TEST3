{% extends 'base.html' %}
{% block title %}Agent 管理{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">网卡扫描</div>
    <div class="toolbar">
        <button class="btn btn-primary" onclick="scanInterfaces()">
            🔍 扫描网卡
        </button>
        <button class="btn btn-secondary" onclick="refreshStatus()">
            🔄 刷新状态
        </button>
    </div>
    <p style="color: var(--text-secondary); font-size: 0.85rem;">
        管理网卡: <strong style="color: var(--secondary);">{{ management_interface }}</strong>
        （此网卡用于 Django Web 服务，不参与 Agent 绑定）
    </p>
</div>

<!-- 配置 IP 模态框 -->
<div id="config-ip-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000;">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 24px; border-radius: 16px; width: 400px;">
        <div class="card-header" style="margin-bottom: 20px;">配置网卡 IP</div>
        <div class="form-group">
            <label class="form-label">Agent ID</label>
            <input type="text" id="config-agent-id" class="form-input" readonly>
        </div>
        <div class="form-group">
            <label class="form-label">网卡名称</label>
            <input type="text" id="config-interface-name" class="form-input" readonly>
        </div>
        <div class="form-group">
            <label class="form-label">IP 地址</label>
            <input type="text" id="config-ip-address" class="form-input" placeholder="例如: 11.11.11.11">
        </div>
        <div class="form-group">
            <label class="form-label">子网掩码 (CIDR)</label>
            <input type="text" id="config-netmask" class="form-input" value="24" placeholder="例如: 24">
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button class="btn btn-primary" onclick="confirmConfigIP()">确认配置</button>
            <button class="btn btn-secondary" onclick="closeConfigModal()">取消</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Agent 列表</div>
    <div id="agent-list">
        <p style="color: var(--text-secondary);">扫描网卡后自动创建 Agent...</p>
    </div>
</div>

<div class="card">
    <div class="card-header">Agent 日志</div>
    <div id="agent-logs" style="background: var(--bg-dark); padding: 16px; border-radius: 8px; font-family: monospace; max-height: 300px; overflow-y: auto; color: var(--text-secondary);">
        选择 Agent 查看日志...
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let selectedAgent = null;

// 扫描网卡 - 同时自动创建 Agent
async function scanInterfaces() {
    try {
        // 1. 扫描网卡
        const scanResult = await apiRequest('/api/interfaces/scan/', 'POST');
        if (scanResult.success) {
            showToast(`扫描到 ${scanResult.count} 个网卡`);

            // 2. 获取网卡列表
            const listResult = await apiRequest('/api/interfaces/list/');
            if (listResult.interfaces) {
                // 3. 为所有非管理网卡自动创建 Agent（包括没有 IP 的网卡）
                for (const iface of listResult.interfaces) {
                    if (!iface.is_management) {
                        // 检查是否已有 Agent
                        const agentsResult = await apiRequest('/api/agents/list/');
                        const existingAgent = agentsResult.agents?.find(a => a.interface_name === iface.name);

                        if (!existingAgent) {
                            // 自动创建 Agent（即使网卡没有 IP）
                            try {
                                await apiRequest('/api/agents/create/', 'POST', {
                                    interface_name: iface.name
                                });
                            } catch (e) {
                                // 如果创建失败（可能因为没有 IP），仍然记录但不报错
                                console.log(`创建 Agent ${iface.name} 失败: ${e.message}`);
                            }
                        }
                    }
                }

                // 4. 刷新 Agent 列表
                await loadAgents();
            }
        } else {
            showToast('扫描失败: ' + scanResult.error, 'error');
        }
    } catch (e) {
        showToast('请求失败: ' + e.message, 'error');
    }
}

// 刷新状态
async function refreshStatus() {
    await loadAgents();
}

// 加载 Agent 列表
async function loadAgents() {
    try {
        const result = await apiRequest('/api/agents/list/');
        if (result.agents) {
            renderAgents(result.agents);
        }
    } catch (e) {
        console.error('加载 Agent 失败:', e);
    }
}

// 渲染 Agent 列表
function renderAgents(agents) {
    const container = document.getElementById('agent-list');

    if (agents.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">暂无 Agent，请先扫描网卡</p>';
        return;
    }

    let html = '<table class="table"><thead><tr><th>Agent ID</th><th>网卡</th><th>IP</th><th>端口</th><th>状态</th><th>操作</th></tr></thead><tbody>';

    agents.forEach(agent => {
        const statusClass = agent.status === 'running' ? 'status-running' : 'status-stopped';
        const statusText = agent.status === 'running' ? '运行中' : '已停止';
        const isRunning = agent.status === 'running';

        html += `
            <tr>
                <td><span class="agent-id">${agent.agent_id}</span></td>
                <td>${agent.interface_name}</td>
                <td>${agent.ip_address || '未配置'}</td>
                <td>${agent.port}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    ${isRunning ?
                        `<button class="btn btn-sm btn-danger" onclick="stopAgent('${agent.agent_id}')">停止</button>
                         <button class="btn btn-sm btn-secondary" disabled style="opacity: 0.5; cursor: not-allowed;" title="运行中不可配置IP">配置IP</button>` :
                        `<button class="btn btn-sm btn-success" onclick="startAgent('${agent.agent_id}')">启动</button>
                         <button class="btn btn-sm btn-secondary" onclick="showConfigIPModal('${agent.agent_id}', '${agent.interface_name}')">配置IP</button>`
                    }
                    <button class="btn btn-sm btn-secondary" onclick="showLogs('${agent.agent_id}')">日志</button>
                </td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}

// 启动 Agent
async function startAgent(agentId) {
    try {
        showToast(`正在启动 Agent ${agentId}...`);
        const result = await apiRequest('/api/agents/start/', 'POST', {
            agent_id: agentId
        });

        if (result.success) {
            showToast(`Agent ${agentId} 启动成功`);
            await loadAgents();
        } else {
            showToast('启动失败: ' + result.error, 'error');
        }
    } catch (e) {
        showToast('请求失败: ' + e.message, 'error');
    }
}

// 停止 Agent
async function stopAgent(agentId) {
    try {
        const result = await apiRequest('/api/agents/stop/', 'POST', {
            agent_id: agentId
        });

        if (result.success) {
            showToast(`Agent ${agentId} 已停止`);
            await loadAgents();
        } else {
            showToast('停止失败: ' + result.error, 'error');
        }
    } catch (e) {
        showToast('请求失败: ' + e.message, 'error');
    }
}

// 查看日志
async function showLogs(agentId) {
    selectedAgent = agentId;

    try {
        const result = await apiRequest(`/api/agents/logs/?agent_id=${agentId}&lines=100`);

        if (result.success) {
            const logsContainer = document.getElementById('agent-logs');
            logsContainer.innerHTML = `<pre style="color: var(--text-secondary); white-space: pre-wrap;">${result.logs}</pre>`;
        } else {
            showToast('获取日志失败: ' + result.error, 'error');
        }
    } catch (e) {
        showToast('请求失败: ' + e.message, 'error');
    }
}

// Toast 提示
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed;
        top: 70px;
        right: 24px;
        padding: 12px 24px;
        background: ${type === 'error' ? 'var(--danger)' : 'var(--success)'};
        color: white;
        border-radius: 8px;
        z-index: 9999;
        animation: fadeIn 0.3s;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 3000);
}

// ========== 配置 IP 功能 ==========

let configAgentId = null;

// 显示配置 IP 模态框
function showConfigIPModal(agentId, interfaceName) {
    configAgentId = agentId;
    document.getElementById('config-agent-id').value = agentId;
    document.getElementById('config-interface-name').value = interfaceName;
    document.getElementById('config-ip-address').value = '';
    document.getElementById('config-netmask').value = '24';
    document.getElementById('config-ip-modal').style.display = 'block';
}

// 关闭配置 IP 模态框
function closeConfigModal() {
    document.getElementById('config-ip-modal').style.display = 'none';
    configAgentId = null;
}

// 确认配置 IP
async function confirmConfigIP() {
    const agentId = document.getElementById('config-agent-id').value;
    const interfaceName = document.getElementById('config-interface-name').value;
    const ipAddress = document.getElementById('config-ip-address').value;
    const netmask = document.getElementById('config-netmask').value;

    if (!ipAddress) {
        showToast('请输入 IP 地址', 'error');
        return;
    }

    try {
        const result = await apiRequest('/api/agents/config-ip/', 'POST', {
            agent_id: agentId,
            ip_address: ipAddress,
            netmask: netmask
        });

        if (result.success) {
            showToast(result.message);
            closeConfigModal();
            await loadAgents();
        } else {
            showToast('配置失败: ' + result.error, 'error');
        }
    } catch (e) {
        showToast('请求失败: ' + e.message, 'error');
    }
}

// 页面加载时自动扫描并加载 Agent 数据
window.onload = async function() {
    // 先扫描网卡（自动创建 Agent）
    await scanInterfaces();
};
</script>
{% endblock %}
